<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Farofa do Guilhermão</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>
      FAROFA DO GUILHERMAO
      <br>
      SE PREPAREM ESTA CHEGANDO
    </h1>

    <p>Contagem regressiva até 22/05 às 16:00</p>

    <div class="contador" id="contador">
      <div class="box"><div class="numero" id="dias">0</div><div class="texto">Dias</div></div>
      <div class="box"><div class="numero" id="horas">0</div><div class="texto">Horas</div></div>
      <div class="box"><div class="numero" id="minutos">0</div><div class="texto">Minutos</div></div>
      <div class="box"><div class="numero" id="segundos">0</div><div class="texto">Segundos</div></div>
    </div>

    <button id="botao">Guilherminho é viado ne mamãe</button>
    <p id="votos">Votos: 0</p>
    <p>se chegar a 10.000 votos guilherminho vai beber e dar o bumbum</p>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    // 🔥 FIREBASE CONFIG (troca a API KEY se precisar)
    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "farofa-guilhermoa.firebaseapp.com",
      databaseURL: "https://farofa-guilhermoa-default-rtdb.firebaseio.com",
      projectId: "farofa-guilhermoa",
      storageBucket: "farofa-guilhermoa.appspot.com",
      messagingSenderId: "1065241743831",
      appId: "1:1065241743831:web:8b59d73f3b475fdc257b92"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const votosRef = ref(db, "votos");

    // 🔥 BOTÃO (soma global)
    document.getElementById("botao").addEventListener("click", () => {
      runTransaction(votosRef, (current) => {
        return (current || 0) + 1;
      });
    });

    // 🔥 atualiza votos em tempo real
    onValue(votosRef, (snapshot) => {
      const votos = snapshot.val() || 0;
      document.getElementById("votos").innerText = `Votos: ${votos}`;
    });


    // 🔥 CONTAGEM REGRESSIVA
    const dataFinal = new Date("2026-05-22T16:00:00").getTime();

    function atualizarContagem() {
      const agora = new Date().getTime();
      const diff = dataFinal - agora;

      if (diff <= 0) {
        document.getElementById("contador").innerHTML =
          `<div class="finalizado">A FAROFA COMEÇOU 🍻🔥</div>`;
        return;
      }

      const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
      const horas = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutos = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const segundos = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById("dias").innerText = dias;
      document.getElementById("horas").innerText = horas;
      document.getElementById("minutos").innerText = minutos;
      document.getElementById("segundos").innerText = segundos;
    }

    atualizarContagem();
    setInterval(atualizarContagem, 1000);

  </script>

</body>
</html>
