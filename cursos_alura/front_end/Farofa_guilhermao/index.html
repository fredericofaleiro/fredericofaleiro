<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>Farofa do Guilhermão</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>
      FAROFA DO GUILHERMAO
      <br>
      SE PREPAREM ESTA CHEGANDO
    </h1>

    <p>Contagem regressiva até 22/05 às 16:00</p>

    <div class="contador" id="contador">

      <div class="box">
        <div class="numero" id="dias">0</div>
        <div class="texto">Dias</div>
      </div>

      <div class="box">
        <div class="numero" id="horas">0</div>
        <div class="texto">Horas</div>
      </div>

      <div class="box">
        <div class="numero" id="minutos">0</div>
        <div class="texto">Minutos</div>
      </div>

      <div class="box">
        <div class="numero" id="segundos">0</div>
        <div class="texto">Segundos</div>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
